# Auto-rebase join/* PRs when main is updated to reduce merge conflicts
name: Rebase Join PRs

on:
  push:
    branches: [main]

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase join PRs onto main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin
          for branch in $(git branch -r | grep 'origin/join/' | sed 's|.*origin/||'); do
            pr=$(gh pr list --head "$branch" --state open --json number -q '.[0].number' 2>/dev/null || true)
            if [ -z "$pr" ]; then continue; fi
            echo "Rebasing PR #$pr ($branch)..."
            git checkout -B "$branch" "origin/$branch" || continue
            if git rebase origin/main; then
              git push origin "$branch" --force-with-lease
            else
              echo "Conflict in $branch - maintainer will resolve manually"
              git rebase --abort
            fi
            git checkout main
          done
